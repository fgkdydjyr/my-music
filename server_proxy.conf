#PROXY-START/

location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

location /api/yiyan {
    proxy_pass https://www.ffapi.cn/int/v1/yiyan;
    proxy_set_header Host www.ffapi.cn;
    proxy_ssl_server_name on;
}

location /api/netease/song/url/v1 {
    proxy_buffers           16 64k;
    proxy_buffer_size       128k;
    proxy_busy_buffers_size 256k;
    proxy_set_header        Host $host;
    proxy_set_header        X-Real-IP $remote_addr;
    proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Host $remote_addr;
    proxy_set_header        X-NginX-Proxy true;
    proxy_pass              http://127.0.0.1:3000/song/url/v1;
    
    sub_filter              '"url":"http://music.163.com' '"url":"/music/unblock';
    sub_filter              '"url":"https://music.163.com' '"url":"/music/unblock';
    sub_filter_types        application/json;
    sub_filter_once         off;
}

location /api/netease/ {
    proxy_buffers           16 64k;
    proxy_buffer_size       128k;
    proxy_busy_buffers_size 256k;
    proxy_set_header        Host $host;
    proxy_set_header        X-Real-IP $remote_addr;
    proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Host $remote_addr;
    proxy_set_header        X-NginX-Proxy true;
    proxy_pass              http://127.0.0.1:3000/;
}

location /music/unblock/ {
    proxy_pass              https://music.163.com/;
    proxy_buffering         off;
    proxy_request_buffering off;
}

#PROXY-END/